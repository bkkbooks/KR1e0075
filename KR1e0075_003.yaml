body:
  text: 題春秋經傳辨疑後蘭溪童君廷式為春秋經傳辨疑之一帙凡九十三首持以示豫豫反覆讀之知廷式之用心亦至矣豫弱冠嘗從邑校讀春秋辛勤鑽摩蓋亦有年其大義炳若日星者雖若可見至微詞奧旨終不得窺其所在自左氏公羊榖梁而下為傳附合者無慮數十百家而能發明聖人微奧者能幾人哉豫初欲會同諸家之言竊附已意殊恐不得聖人之心而為説亦纍也國初新安趙子常氏精於春秋之學者嘗為補注又為屬詞潛溪宋太史稱其直探聖人之心於千載之上若吾廷式者得非亦欲探聖人之心者乎嗚呼聖人之心得不得焉即其言可知豫書此卷末蓋亦不能無愧也成化二十二年秋七月朔日烏傷王汶謹識
