body:
  text: 春秋經傳辨疑目録春秋類春王正月公及邾儀父盟于蔑夏四月辛卯君氏卒八月庚辰宋公和卒癸未葬宋穆公衛州吁弒其君完秋翬帥師春王正月公即位春王正月戊申宋督弒其君與夷及其大夫孔父滕子來朝公與夫人薑氏遂如齊夫人孫于齊五月葬桓王六月乙丑齊侯葬紀伯姬冬十有一月癸未齊無知八月庚申及齊師戰于乾時我師敗績大夫宗婦覿用幣伯姬歸于把曹殺其大夫公會把伯姬于洮莒慶來逆叔姬秋七月戊辰夫人薑氏薨于夷齊人以歸楚人伐鄭公會齊侯宋公陳世子欵鄭世子華盟于寧母禘于太廟用致夫人冬晉里克殺其君之子奚齊公及夫人薑氏會齊侯于陽榖季姬及鄫子遇于防使鄫子來朝隕石于宋五天王出居于鄭齊人侵我西鄙公追齊師至􅈶弗及公子買戍衛不卒戍刺之衛殺其大夫元咺及公子瑕夏四月四卜郊不從乃免牲猶三望晉人敗狄于箕隕霜不殺草李梅實天王使毛伯來錫公命晉侯及秦師戰于彭衙秦師敗績楚人圍江逆婦薑于齊毛伯來求金晉人殺其大夫士縠及箕鄭父楚人伐鄭公子遂會晉人宋人衛人許人救鄭楚子蔡侯次于厥貉子叔姬卒公還自晉鄭伯會公于棐齊公子商人弒其君舍齊人執單伯齊人執子叔姬季孫行父如齊遂以夫人婦薑至自齊宋師圍曹齊高固來逆子叔姬叔孫得臣卒陳殺其大夫泄冶陳夏徴舒弒其君平國楚子伐鄭衛殺其大夫孔達楚子圍宋公會晉侯宋公衛侯曹伯伐鄭公至自晉衛孫良夫帥師侵宋季孫行父如晉宋華元出奔晉宋華元自晉歸于宋夫人姒氏薨莒人滅鄫公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋七月己未同盟于亳城北秋八月丁巳日有食之衛孫林父帥師伐齊仲孫速帥師伐邾五月甲午宋災宋伯姬卒楚子麇卒公如晉至河乃復楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳暨齊平陳災冬築郎囿夏五月戊辰許世子止弒其君買冬葬許悼公蔡侯朱出奔楚有鸜鵒來巢晉侯使荀躒唁公于乾侯元年春王晉士鞅帥師圍鮮虞宋樂大心出奔曹宋公之弟辰暨仲他石彄出奔陳宋公之弟辰及仲他石彄公子地自陳入于蕭以叛叔還如鄭涖盟鄭罕達帥師伐宋蔡殺其大夫公子駟盜殺蔡侯申齊陽生入于齊齊陳乞弒其君荼齊侯陽生卒西狩獲麟臣等謹案春秋經傳辨疑一卷明童品撰品蘭溪人事迹無考前有自序題成化戊戌冬十一月末又有𢎞治壬戌二月跋云是歲品以儒學生教授於陸生震汝亨之家成此一帙距今二十五年云云蓋老儒也春秋三傳左氏採諸國史公穀授自經師草野之傳聞自不及簡䇿之記載其義易明是編論左氏所載事迹凡九十三條於三傳異同者大旨多主左氏而駁公穀蓋由於此然於宋師圍曹則疑左氏所載不甚明曉於華元出奔晉一條亦有疑於左氏之説則亦未嘗堅持門户偏黨一家固讀三傳者所當參考也刻本久佚故朱彝尊經義考注云未見此蓋傳鈔舊本幸未佚亡者是宜録而存之矣乾隆四十二年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋經傳辨疑原序春秋一經裁自聖心遊夏不能贊一辭未易讀也何以得其疑而辨之乎蓋聖人之經詞義嚴正本末詳明固無可疑因傳而有所疑耳曷為因傳而有所疑左氏得本末之詳不能無附會之誣公榖得義例之精不能無穿鑿之弊故文中子謂三傳作而春秋散豈虛語哉然則學者於傳將奚從善乎程子有言曰因傳以考經之事實因經以别傳之真偽斯為至言矣品嘗抱夫子之遺經究時事之終始雖於微詞奧義未能有得然於大經大法頗窺其梗槩既而求之諸傳則多與經背馳者先儒固嘗疑而辨之矣乃因先儒之疑每讀而每得其疑以不敢蓄故因而筆之積日纍月遂成卷帙題曰春秋經傳辨疑非敢自謂能辨其疑也特辨之以俟知者而求解之耳雖不能無獲戾於賢傳庶少有補於聖經若曰執經傳異同之言而指為夫子筆削之法是謂棄經任傳未免有買櫝還珠之失品則取珠而還其櫝也觀者幸恕其狂瞽成化戊戌冬十一月長至日蘭溪童品序是歲品以儒學生教授於陸生震汝亨之家成此一帙距今二十五年矣齒益長而學不進韓子所謂聰明不及於前時道德日負於初心者豈虛語耶因刻於梓而識之𢎞治壬戌春二月丁卯品識
