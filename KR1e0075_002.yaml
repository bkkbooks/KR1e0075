body:
  text: 春秋經傳辨疑卷下明童品撰公會晉侯宋公衛侯曹伯伐鄭成公三年胡氏曰宋衛未葬曷為而稱爵也背殯越境以吉禮從金革之事也故譏之竊恐未必其然諸侯未踰年則稱子是固然矣蓋君卒之年猶舊君之年也明年則新君之年耳故諸侯未踰年而不改元不稱爵者不可一年而二君也明年必改元而稱爵者不可曠年而無君也宋衛二君葬期既已過且改元矣固無嫌於稱爵但踰期不葬而從事於金革此則罪之大者為可責耳恐不必以稱爵之嫌為貶也使皆稱子獨無貶乎故胡氏之説亦有不盡然者公至自晉成公三年胡氏曰公行多不至其書公至自晉何其至也必有以也竊疑似泥按經公會諸侯者十二惟於蜀瑣澤不至其餘皆至如晉者四皆至何謂公行多不至耶魯自春秋以來至是歷六君矣皆喪畢而不朝於京師以受王命者也胡氏何獨責之成公耶愚謂國之所重者君故君之出入必書重之也果何有以哉衛孫良夫帥師侵宋成公六年左氏云晉伯宗夏陽説衛孫良夫寧相鄭人伊雒之戎陸渾蠻氏侵宋以其辭會也按此則當以晉為主而傳與經不合矣從經可也季孫行父如晉成公六年左氏云季文子如晉賀遷也又按左傳晉遷於新田在夏之四月丁丑經於夏六月既書公孫嬰齊如晉則此時晉已遷矣晉霸主之國也若果擇地利而遷國於新田必豫告諸侯而諸侯必及時賀之矣嬰齊如晉左氏以為命伐宋蓋晉命以伐宋也魯不於此時賀乃至冬而賀之乎晉之遷國不見於經於賀遷之説似無所徵宋華元出奔晉宋華元自晉歸于宋成公十五年左氏云華元出奔魚石止之河上乃自河上而復據此則華元未嘗濟河而至晉雖奔而不奔也春秋何為一以書其出奔晉一以書其自晉歸於宋乎豈至河上即為至晉乎夫人姒氏薨襄公四年啖氏云如左氏言則當不書薨葬此文當在定十五年姒氏卒下誤在此耳按左氏有匠慶謂文子之言及君長誰受其咎之語季文子卒於明年其去定公甚逺且襄公方七歲定公即位亦已十五年孰為幼君啖氏何其考之疏耶莒人滅鄫襄公六年榖梁曰莒人滅鄫非滅也立異姓以蒞祭祀滅亡之道也公羊曰莒女有為鄫夫人者蓋欲立其出也胡氏從之於是莒人滅鄫之義遂異於他滅國者按春秋滅國不一如齊之滅談滅遂滅萊之類皆以兵臨其國奪其土地有其人民殺其君而覆其社稷故謂之滅也莒人滅鄫同一書法何獨異其滅耶獨不觀去年夏書叔孫豹鄫世子巫如晉則是時鄫子尚存世子已定公榖之説何其疏耶借曰立異姓猶當存其國之虛號如後世吕政之秦牛濬之晉聖人於鄫子朝聘會同之禮獨得廢而不書之乎自後鄫不復見其社稷之滅亡也明矣愚謂此書莒人滅鄫者由莒之強也觀八年夏伐我東鄙可見矣至昭公四年書取鄫者由莒之衰也觀夫取鄫之後莒牟陵以牟婁及方兹來奔叔弓敗莒師于蚡泉可見矣左氏云莒人滅鄫鄫恃賂也雖未必然非立異姓以為滅昭昭也公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北襄公十一年亳之同盟程子胡氏皆云鄭服而同盟也然左氏記盟誓之詞正以十二國為言則非鄭服而同盟也可見矣竊觀晉之三駕伐鄭皆由鄭為之兵端也初駕之伐則以楚公子貞鄭公孫輒帥師伐宋而舉也再駕之伐則以鄭公孫舍之帥師侵宋而舉也三駕之伐則以楚子鄭伯伐宋而舉也非有亳城之盟則無蕭魚之功若以同盟為鄭服而鄭何再從楚又有伐宋之師耶蕭魚之會楚人執鄭行人良霄然後始見鄭服之實耳據經考事亳城同盟非鄭服也秋八月丁巳日有食之襄公十五年張氏曰悼公卒政逮大夫之徴也此説鑿矣日者天下之所共仰非晉一國之日周有天王列國有諸侯其食豈專為晉示變哉然畏天之威而恐懼修省則無彼此之分也衛孫林父帥師伐齊襄公十九年左氏云晉欒魴帥師從衛文子伐齊故張氏高氏皆主其説以責晉然經但書衛師伐齊而不書晉師竊恐晉枉受諸家之責耳是時衛君衎為林父所逐而奔於齊也已五年矣此其伐齊蓋為衛君剽而伐之也張氏以為討強暴之罪亦恐未然仲孫速帥師伐邾襄公二十年左氏曰邾人驟至以諸侯之事勿能報也秋孟莊子伐邾以報之按澶淵之盟公與邾子俱至豈有邾人驟至之理設使邾人驟至則我之師乃報伐之師聖人奚為不著邾人之暴而反著我之暴且重背盟棄好之惡耶公榖胡氏無傳疑許氏得之五月甲午宋災宋伯姬卒襄公三十年榖梁曰取卒之日加之災上者見以災卒也竊恐未然春秋凡書災必書其日宋災在甲午安得不加日於災上耶况下書天王殺其弟佞夫王子瑕奔晉皆若同日然此固未可以知伯姬之果卒於火也但連記宋事書卒於災之下理或然耳榖梁謂伯姬之舍失火左右請少避伯姬曰婦人之義傅母不在宵不下堂公羊以為有司請避火伯姬曰婦人夜出不見傅母不下堂傅至矣母未至也逮於火而死竊惟伯姬之歸於宋三國來媵其事固素著矣守婦道以卒於火固為大節但伯姬是時年已六十矣有姊姪焉有子婦焉雖或異宫當不甚相逺也榖梁謂左右請避火此左右必皆婦人也伯姬雖欲守貞而不肯苟避為之子婦姊姪者獨不能竭力赴救扶之而出乎况傅至矣而甘死於火似非中庸之道也且公羊以為有司請避不知有司男子乎婦人乎伯姬之宫夜失火有司尚至而子婦姊姪不至尊奉君母之道何在耶春秋果記伯姬卒於火雖所以著伯姬守貞之節亦以著宋臣不救之罪也吳氏之説得之楚子麇卒昭公元年按左氏楚令尹圍將聘於鄭未出境聞王有疾而還入問王疾縊而殺之如此則圍實弒君之賊人人得而誅之者春秋曷為諱其惡而赦其罪耶胡氏曰令尹圍弒君以立中國力所不加而莫能致討則亦已矣至大合諸侯於申與會者十有三國若正以弒君將恐天下後世以篡弒之賊非特不必致討又可從之以主盟會而無惡矣聖人至此憫之甚懼之甚憫之甚者憫中國之衰微而不能振也懼之甚者懼人欲之橫流而不能遏也是故察微顯權輕重而略其篡弒以扶中國制人欲存天理其義微矣此蓋篤信左氏而不信聖經故辨之費詞如此也獨不觀齊商人亦嘗弒其君舍諸侯與之兩會盟於扈而文公獨兩與之盟正與楚圍之事相類也春秋何為書之而不略其篡弒耶且楚圍之執齊慶封也左氏謂其使負之斧鉞以徇於諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫者則圍所為亦可謂知義矣不然又何以為此舉而能不愧於心耶公如晉至河乃復昭公二年左氏云晉少薑卒公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉公羊曰其言至河乃復何不敢進也榖梁云恥如晉故著有疾也公如晉不得入季孫宿如晉而得入惡季孫宿也按經春晉侯使韓起來聘修好於魯而魯亦遣叔弓報之二國未嘗有間也何為不敢進公羊之説不通矣榖梁既曰恥如晉故著有疾又曰不得入亦自相矛盾矣竊疑公如晉至河乃復者不一惟一書有疾乃復其餘恐皆公自怠於行而復耳聖人因其屢如晉至河乃復故屢書之亦猶每歲書公在楚公在乾侯之例也左氏每異其傳以附會之未必果於根據國史也楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳昭公四年楚子伐吳之役皆會於申之諸侯也徐以見執而不與其餘不與者四國鄭伯滕子小邾子宋世子佐也左氏以為宋太子鄭伯先歸然則滕子小邾子又安之耶按經只當以書者為正其不書者不必曲為之説可也暨齊平昭公七年左氏云齊求之也李氏云當截齊求之也四字為暨齊平之傳癸巳以下非本傳似矣李氏以癸巳以下皆齊侯伐北燕而與燕成之事與上文暨齊平不相屬故也竊疑左氏之傳如此者多又安知左氏之意非以暨齊平為承上文齊侯伐北燕之義耶左氏此傳恐不無差謬也胡氏承公羊之説曰不得已曰暨以為齊欲平魯而魯不以平為急乃不得已而為之平耳按齊魯年來未嘗有隙齊方伐北燕亦何汲汲而欲求平於魯也觀之下書叔孫舍如齊涖盟九年仲孫貜如齊聘但見魯往未見齊來何為齊求之乎據經所書非北燕暨齊平固無疑矣但訓暨為不得已之辭以為齊求之也有未通耳按定公十年書宋公之弟辰暨仲他石彄出奔陳胡云辰以兄故帥其大夫出奔則暨者豈辰之不得已而從他彄出奔哉比事而觀恐與及字意同不必深求之也陳災昭公九年胡傳云凡外災告則書今楚已滅陳夷於屬縣使穿封戍為公矣必不遣使告於諸侯言亡國之有天災也何以書於魯國之策乎當是時楚子與叔弓會於陳則目擊其事矣雖彼不來告此不往弔叔弓使畢而歸語陳故也魯史遂書之耳竊疑此亦臆度之見耳叔弓春會楚子於陳知正月二月乎知三月乎至是陳災乃在夏之四月安知叔弓此時果尚在陳而目擊其事乎抑已反於魯而在途乎是未可知也恐魯史記列國時事必有所據而書恐不必泥其來告與目擊其事來言而書也如楚之滅陳若泥其來告則書豈陳人告耶抑楚人告耶恐不必泥冬築郎囿昭公九年左氏曰書時也夫周之冬乃夏之酉戌亥月正農功收黍稷菽播麥之時也築囿豈其時乎若書時是無譏也何以書之夏五月戊辰許世子止弒其君買昭公十九年按左傳許悼公瘧五月戊辰飲世子止之藥卒太子奔晉公羊云止進藥而藥殺是以君子加弒焉榖梁曰日弒正卒也正卒則止不弒而曰弒責止也止曰我與夫弒者不立乎其位以與其弟虺哭泣啜飲飦粥嗌不容粒未踰年而死故君子即止自責而責之也據經而言見許止之親弒其父無疑矣據左氏而言止因君父之瘧投藥而弒懼討而奔晉於經亦合據公榖所言則止僅以不嘗藥之過子道之不盡故君子加之弒耳信如公榖所云則止之自責而不居其位毁傷而至滅其性雖孝子之道不是過也如是則止初無篡弒之心特失之不嘗藥而誤殺耳非故殺也書曰宥過無大又曰罪疑惟輕聖人固當原其情而宥其罪可也何為輕以大逆加之乎吾恐聖人必不如是之深刻也飲藥而遽卒焉惡知非故以藥而殺之耶不嘗不足責也公榖之説無補於經而反戾於經不得不辨冬葬許悼公昭公十九公羊曰賊未討何以書葬不成乎弒也曷為不成乎弒止進藥而藥殺也止進藥而藥殺曷為加弒焉耳譏子道之不盡也曰許世子止弒其君買是君子之聽止也葬許悼公是君子之赦止也赦止者免止之罪辭也穀梁曰日卒時葬不使止為弒父也竊恐未然夫天下之大惡逆罪莫大於弒父與君也固其罪也不可以輕赦於人非其罪也不可以輕加於人若曰不成乎止之弒則書曰弒者是輕加以大惡之罪也既加以大惡之罪又遽輕赦之則是亂臣賊子之罪亦可以輕加於人亦可以輕赦於人矣豈春秋之大經大法哉若謂賊未討而書葬為疑則蔡世子般之弒蔡景公而篡其位亦未嘗不書葬也豈亦不成乎蔡般之弒歟公榖之説殊戾於經蔡侯朱出奔楚昭公二十一年朱榖梁作東榖梁曰東者東國也曰東惡而貶之也以去國稱東為貶劉氏固辨其非矣夫朱與東字相似而誤且或闕一國字亦不可知况二十三年夏書蔡侯東國卒于楚距朱出奔方年半餘耳若是二人不應蔡之二君皆奔卒於楚且朱無反歸之文東國無出奔之記汪氏引左氏及史記以證其為二人蓋信左氏也左氏去聖經未逺其所記事尚多難信况史記乎按五經俱有闕文誤字何得春秋獨無學者傳其疑而闕之可也有鸜鵒來巢昭公二十五年公羊云非中國之禽也又穴而巢也榖梁曰鸜鵒穴者而曰巢或曰增之也胡氏曰鸜鵒宜穴處於下而巢居於上季孫宜臣順於下而主祭於國反常為異之兆竊謂鸜鵒江南所産然皆假鵲巢以生子能飛即羣栖於木未聞有穴居於地者公榖皆非灼見之説也先儒謂鸜鵒不踰濟水故魯以來巢為異左氏謂記所無是也若其所記童謠之言恐亦失之附會然季氏據國之兆胡氏歸之鸜鵒得無鑿乎晉侯使荀躒唁公于乾侯昭公三十一年左氏云季孫從知伯如乾侯子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河荀躒掩耳而走曰寡君其罪之恐敢與知魯國之難臣請復於寡君退而謂季孫君怒未怠子姑歸祭愚按左氏此傳恐未可信季孫𫝑能逐君矣果肯甘心降意從知伯如乾侯以請君復國則春秋當書其事矣何為反書晉侯使荀躒唁公於乾侯乎使昭公果能誅季孫而不能見夫人則誅之久矣必不至有今日也况昭公困辱於外已久猶且躁忿尚氣如此乎俟復國而誅意如又豈晚乎似未可信觀上書季孫意如會晉荀躒于適歷則晉侯使荀躒以納公之事而審於季孫也可知此書晉侯使荀躒唁公于乾侯則荀躒因季孫之不從而告晉侯故晉侯使來唁公也據經所書其事明甚據傳所言乃昭公之自不肯復國也有是哉元年春王定公元年經本書元年春王三月晉人執宋仲幾于京師公羊榖梁欲發定無正之義乃截春王二字為一節胡氏因之致使經文離析意不相續此傳經者之大病也况定公即位於夏之六月戊辰此時記事聖人之心豈豫在譏定公哉其無正月不足泥也晉士鞅帥師圍鮮虞定公五年左氏曰報觀虎之役也按左氏定公三年秋九月鮮虞人敗晉師於平中獲晉觀虎恃其勇也四年秋經書晉士鞅衛孔圉帥師伐鮮虞左氏不於此時曰報觀虎之役而至此始云云未知何如豈有鮮虞之小國能敗晉師而獲其勇將春秋何以不書耶恐亦晉陵小國耳宋樂大心出奔曹定公十年按左氏大心出奔無傳惟去年春王正月下有左氏云宋公使樂大心盟於晉且逆樂祈之尸辭偽有疾子明言於公曰右師將不利戴氏不肯適晉將作亂不然無疾乃逐桐門右師故高氏王氏主此以斷大心之奔然大心奔曹在今年秋與左氏所記年月差一年有半左氏不附之經下而附録於先年恐不如是之乖謬也按經此下書公子地出奔陳冬書宋公之弟辰暨仲他石彄出奔陳明年春書宋公之弟辰及仲他石彄公子地自陳入于蕭以叛秋書宋樂大心自曹入於蕭則樂大心之奔蓋與公子地及弟辰同一黨也不得其情而徒議其罪或者不可乎宋公之弟辰暨仲他石彄出奔陳定公十年左氏記辰之言曰吾以國人出君誰與處胡氏曰暨云者罪辰以兄故帥其大夫出奔無尊君之義暨者不得已之辭又以見仲他石彄見脅於辰不能自立無大臣之節挾二卿出奔者實辰也曾謂其果不得已乎若如胡氏所訓暨字之義則暨齊平者不得已在魯暨仲他石彄者不得已在辰又謂仲他石彄見脅於辰豈有不得已者而可以脅人耶胡氏此傳論暨之義未免自相矛盾敢論及之杜氏曰暨與也似為得之宋公之弟辰及仲他石彄自陳入于蕭以叛定公十一年胡傳不見於本文却於秋宋樂大心自曹入於蕭下見之非釋經之體如此類非一似未便於學者且曰出奔則稱暨入於蕭以叛則稱及其論暨及二字頗費詞説恐未免有穿鑿之失叔還如鄭涖盟定公十一年杜氏曰叔還詣曾孫按叔詣卒於昭公二十九年至此相距十四五年耳而叔還即見經叔詣之年壽雖莫考其詳大約不過七八十歲而已使叔還果為詣曾孫然則叔詣之子若孫安在耶竊疑叔還非叔詣子即孫也恐非曾孫鄭罕達帥師伐宋定公十五年杜氏曰宋公子地奔鄭鄭人為之伐宋欲取地以處之按經於定公十年秋書公子地出奔陳十一年春書公子地自陳入於蕭以叛考之左氏並無公子地奔鄭之事恐杜氏之説必有所據更考之蔡殺其大夫公子駟哀公二年按左氏吳泄庸如蔡納聘而稍納師師畢入衆知之蔡侯告大夫殺公子駟以説哭而遷墓冬蔡遷于州來竊恐未然如經所書則蔡先遷於州來而後殺其大夫如左氏所記則先殺其大夫而後遷於州來傳與經實相戾也盜殺蔡侯申哀公四年按左氏蔡昭公將如吳諸大夫恐其又遷也承公孫翩逐而射之入於家人而卒如是則公孫翩為弒君之賊明矣春秋何為隱其名而以盜書耶胡氏從左氏而謂變文書盜以懲有國之君恐未然也竊疑凡書盜者皆當時不覺被盜而殺之不得其名氏如後世擊秦始皇於博浪沙中之類史官欲求其名而不得書盜是也齊侯陽生卒吳為我故警師伐齊齊人弒其君以説於吳吳師乃還據傳文言之則是齊侯陽生之卒非正卒也乃弒也何春秋於弒君之賊往往隱其惡而赦其罪耶胡氏信其説恐亦過矣臨川吳氏云當時吳師在齊而公卒遂以為弒耳此説是已况吳子既忍伐齊惡有聞悼公之赴而三日哭於軍門之外者乎且邾子方來奔左氏謂齊甥也故遂奔齊又豈有從吳伐齊之事耶愚謂春秋信史也為魯諱弒逆之外其餘弒則弒卒則卒豈至變名亂實如是耶或者以為此為聖人筆削之微意恐非也西狩獲麟哀公十四年按杜氏云麟者仁獸聖王之嘉瑞也時無明王出而遇獲仲尼傷周道之不興感嘉瑞之無應故因魯春秋而修諸侯之政絶筆於獲麟之一句者所感而作因所以為終也據此則春秋因獲麟而後作也胡氏從范氏以為春秋文成而麟至則春秋成而後獲麟也孟子嘗曰世衰道微邪説暴行有作臣弒其君者有之子弒其父者有之孔子懼作春秋則春秋又因亂臣賊子而作而非為麟也絶筆於獲麟公羊榖梁之春秋然耳左氏之經實終於哀公十六年夏四月己丑孔丘卒况獲麟在春雖不言何月亦不過一時耳春秋一經孔子雖大聖猶待七十二年然後作恐非一時一月可成也然則文成致麟之説似亦未通要之麟本聖王之瑞出而獲遇孔子未必不傷其出之不遇而嘆其道之窮也果感麟而作春秋乎抑文成而麟至乎右辨疑止據大全及左傳而言甚愧見聞之不廣也品識春秋經傳辨疑卷下
